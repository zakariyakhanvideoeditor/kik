<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Easy Bookmark Saver</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --s1: #161b27;
    --s2: #1c2333;
    --s3: #232c3d;
    --bd: rgba(255,255,255,0.07);
    --bdh: rgba(255,255,255,0.14);
    --tx: #e8eaf0;
    --tx2: #a0aab8;
    --tx3: #5a6478;
    --ac: #6366f1;
    --ac2: #818cf8;
    --acg: rgba(99,102,241,0.15);
    --rd: #ef4444;
    --gn: #10b981;
    --shadow: rgba(0,0,0,0.5);
  }

  body {
    background: var(--bg);
    color: var(--tx);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
  }

  /* Ambient background glow */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -150px; right: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(129,140,248,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    animation: slideup 0.5s cubic-bezier(.22,.68,0,1.2) both;
  }

  @keyframes slideup {
    from { opacity: 0; transform: translateY(28px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Brand header */
  .brand {
    text-align: center;
    margin-bottom: 28px;
  }
  .brand-logo {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--ac), #4f46e5);
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin-bottom: 12px;
    box-shadow: 0 8px 32px rgba(99,102,241,0.35);
  }
  .brand-name {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.3px;
    background: linear-gradient(135deg, var(--tx) 0%, var(--ac2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .brand-sub {
    font-size: 12px;
    color: var(--tx3);
    margin-top: 3px;
    letter-spacing: 0.3px;
  }

  /* Card */
  .card {
    background: var(--s1);
    border: 1px solid var(--bdh);
    border-radius: 18px;
    padding: 28px 26px 26px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.03) inset;
  }

  .card-header {
    margin-bottom: 20px;
  }
  .card-icon {
    font-size: 32px;
    margin-bottom: 10px;
    display: block;
    filter: drop-shadow(0 2px 8px rgba(99,102,241,0.4));
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--tx);
    margin-bottom: 5px;
  }
  .card-email-row {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--acg);
    border: 1px solid rgba(99,102,241,0.25);
    border-radius: 8px;
    padding: 8px 12px;
    margin-top: 10px;
  }
  .card-email-dot {
    width: 7px; height: 7px;
    background: var(--ac2);
    border-radius: 50%;
    flex-shrink: 0;
  }
  .card-email-text {
    font-size: 13px;
    color: var(--ac2);
    font-weight: 600;
    letter-spacing: 0.1px;
    word-break: break-all;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--bd);
    margin: 18px 0;
  }

  /* Field */
  .field-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--tx3);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 7px;
  }
  .pw-wrap {
    position: relative;
  }
  .pw-wrap input {
    width: 100%;
    background: var(--s2);
    border: 1.5px solid var(--bd);
    border-radius: 10px;
    padding: 11px 42px 11px 14px;
    color: var(--tx);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    transition: border-color .18s, box-shadow .18s;
    outline: none;
  }
  .pw-wrap input:focus {
    border-color: var(--ac);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
  }
  .pw-wrap input::placeholder { color: var(--tx3); }
  .eye-btn {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--tx3);
    padding: 0;
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    transition: color .15s;
  }
  .eye-btn:hover { color: var(--ac2); }

  /* Strength bar */
  .strength-wrap {
    margin-top: 8px;
    display: none;
  }
  .strength-wrap.show { display: block; }
  .strength-bar-bg {
    height: 3px;
    background: var(--s3);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 4px;
  }
  .strength-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width .3s ease, background .3s ease;
    width: 0%;
  }
  .strength-label {
    font-size: 11px;
    color: var(--tx3);
    font-weight: 500;
  }

  /* Error / success messages */
  .msg {
    font-size: 12.5px;
    border-radius: 9px;
    padding: 9px 12px;
    margin-top: 12px;
    display: none;
    line-height: 1.5;
  }
  .msg.show { display: block; }
  .msg.err { color: #fca5a5; background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.25); }
  .msg.ok  { color: #6ee7b7; background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.3); }

  /* Save button */
  .btn-save {
    margin-top: 18px;
    width: 100%;
    background: linear-gradient(135deg, var(--ac) 0%, #4f46e5 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: all .2s ease;
    position: relative;
    overflow: hidden;
  }
  .btn-save::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
    opacity: 0;
    transition: opacity .2s;
  }
  .btn-save:hover:not(:disabled)::before { opacity: 1; }
  .btn-save:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(99,102,241,0.4); }
  .btn-save:active:not(:disabled) { transform: translateY(0); }
  .btn-save:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* Spinner inside button */
  .btn-save .spin {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Success state */
  .success-screen {
    text-align: center;
    padding: 10px 0 4px;
    display: none;
  }
  .success-screen.show { display: block; }
  .success-ico {
    font-size: 52px;
    margin-bottom: 14px;
    animation: pop .5s cubic-bezier(.22,.68,0,1.5) both;
  }
  @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .success-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--gn);
    margin-bottom: 8px;
  }
  .success-sub {
    font-size: 13px;
    color: var(--tx2);
    line-height: 1.6;
  }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--tx3);
    margin-top: 18px;
    letter-spacing: 0.2px;
  }
</style>
</head>

    <div class="brand-name">Easy Bookmark Saver</div>
    <div class="brand-sub">Secure Account Recovery</div>
  </div>

  <div class="card">

    <!-- RESET FORM -->
    <div id="resetForm">
      <div class="card-header">
        <span class="card-icon">🔑</span>
        <div class="card-title">Set New Password</div>
        <div class="card-email-row">
          <div class="card-email-dot"></div>
          <div class="card-email-text" id="emailDisplay">Loading...</div>
        </div>
      </div>

      <div class="divider"></div>

      <label class="field-label">New Password</label>
      <div class="pw-wrap">
        <input type="password" id="newPassword" placeholder="Min. 6 characters..." autocomplete="new-password" oninput="checkStrength()"/>
        <button class="eye-btn" onclick="toggleEye()" type="button" id="eyeBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="eyeIcon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <div class="strength-wrap" id="strengthWrap">
        <div class="strength-bar-bg">
          <div class="strength-bar-fill" id="strengthBar"></div>
        </div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>

      <div class="msg err" id="errMsg"></div>

      <button class="btn-save" id="saveBtn" onclick="doReset()">Save New Password</button>
    </div>

    <!-- SUCCESS -->
    <div class="success-screen" id="successScreen">
      <div class="success-ico">✅</div>
      <div class="success-title">Password Updated!</div>
      <div class="success-sub">Your password has been changed.<br>You can now sign in to the extension.</div>
    </div>

  </div>

  <div class="footer-note">Easy Bookmark Saver · Secured by Firebase</div>
</div>

<script>
  // Parse oobCode and email from URL
  const params = new URLSearchParams(window.location.search);
  const oobCode = params.get('oobCode');
  const email = params.get('email') || 'your account';

  document.getElementById('emailDisplay').textContent = email;

  const EYE_OPEN = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  const EYE_SHUT = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
  let eyeOpen = false;

  function toggleEye() {
    eyeOpen = !eyeOpen;
    const inp = document.getElementById('newPassword');
    inp.type = eyeOpen ? 'text' : 'password';
    document.getElementById('eyeBtn').innerHTML = eyeOpen ? EYE_SHUT : EYE_OPEN;
  }

  function checkStrength() {
    const val = document.getElementById('newPassword').value;
    const wrap = document.getElementById('strengthWrap');
    const bar = document.getElementById('strengthBar');
    const label = document.getElementById('strengthLabel');
    if (!val) { wrap.classList.remove('show'); return; }
    wrap.classList.add('show');
    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const levels = [
      { pct: '20%', color: '#ef4444', text: 'Too weak' },
      { pct: '40%', color: '#f97316', text: 'Weak' },
      { pct: '60%', color: '#eab308', text: 'Fair' },
      { pct: '80%', color: '#3b82f6', text: 'Good' },
      { pct: '100%', color: '#10b981', text: 'Strong 💪' },
    ];
    const lvl = levels[Math.min(score - 1, 4)] || levels[0];
    bar.style.width = lvl.pct;
    bar.style.background = lvl.color;
    label.style.color = lvl.color;
    label.textContent = lvl.text;
  }

  async function doReset() {
    const pw = document.getElementById('newPassword').value;
    const errMsg = document.getElementById('errMsg');
    const btn = document.getElementById('saveBtn');
    errMsg.classList.remove('show');

    if (!pw || pw.length < 6) {
      errMsg.textContent = '❌ Password must be at least 6 characters.';
      errMsg.classList.add('show');
      document.getElementById('newPassword').focus();
      return;
    }
    if (!oobCode) {
      errMsg.textContent = '❌ Invalid or expired reset link. Please request a new one.';
      errMsg.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>Saving...';

    try {
      const API_KEY = "AIzaSyBWJkRqvDlNV78SwXVPrxm9mqjMKUcRvUY";
      const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:resetPassword?key=${API_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ oobCode, newPassword: pw })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);

      // Show success
      document.getElementById('resetForm').style.display = 'none';
      document.getElementById('successScreen').classList.add('show');
    } catch(e) {
      const msgs = {
        'EXPIRED_OOB_CODE': '❌ This reset link has expired. Please request a new one.',
        'INVALID_OOB_CODE': '❌ Invalid reset link. Please request a new one.',
        'WEAK_PASSWORD': '❌ Password must be at least 6 characters.',
        'USER_DISABLED': '❌ This account has been disabled.',
      };
      let msg = '❌ Something went wrong. Please try again.';
      for (const key in msgs) { if (e.message.includes(key)) { msg = msgs[key]; break; } }
      errMsg.textContent = msg;
      errMsg.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Save New Password';
    }
  }

  // Allow Enter key
  document.getElementById('newPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') doReset();
  });
</script>
